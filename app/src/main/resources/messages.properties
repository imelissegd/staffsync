# ============================================================
# messages.properties
# Centralized message keys for all backend error and system messages.
# ============================================================

# Auth: success
auth.register.success=Account created successfully.

# Auth: validation errors
auth.username.required=Username is required.
auth.password.required=Password is required.
auth.password.too.short=Password must be at least 6 characters.
auth.username.taken=Username already taken. Please choose another.
auth.credentials.invalid=Invalid username or password.

# Department: success
department.created.success=Department created successfully.
department.updated.success=Department updated successfully.
department.deleted.success=Department deleted successfully.

# Department: not found
department.not.found.id=Department not found with id: {0}
department.not.found.name=Department not found with name: {0}

# Department: validation errors
department.name.required=Department name is required.
department.name.duplicate=Department with name ''{0}'' already exists.

# Department: constraint errors
department.delete.has.employees=Cannot delete department ''{0}'' because it still has employees assigned to it. Reassign or remove those employees first.

# Employee: success
employee.created.success=Employee added successfully.
employee.updated.success=Employee updated successfully.
employee.deleted.success=Employee deleted successfully.

# Employee: not found
employee.not.found.id=Employee not found with id: {0}
employee.not.found.employee.id=Employee not found with employee ID: {0}

# Employee: validation errors
employee.id.required=Employee ID is required.
employee.id.duplicate=Employee with ID {0} already exists.
employee.name.required=Employee name is required.
employee.dob.required=Date of birth is required.
employee.age.invalid=Employee age must be between 18 and 100.
employee.department.required=Department is required.
employee.department.not.exist=Department with id {0} does not exist.
employee.salary.invalid=Salary must be greater than 0.
employee.search.name.empty=Search name cannot be empty.
employee.department.filter.empty=Department name cannot be empty.

# Global / unexpected errors
error.unexpected=An unexpected error occurred: {0}
error.validation.failed=Validation failed.
