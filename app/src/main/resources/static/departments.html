<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments — Employee Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .navbar-logo-accent { color: var(--teal); }

        /* ── Page layout ── */
        .dept-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 820px) {
            .dept-grid { grid-template-columns: 1fr; }
        }

        /* ── Form card ── */
        .form-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            position: sticky;
            top: 1.5rem;
        }
        .form-card-title {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.25rem;
            padding-bottom: 0.6rem;
            border-bottom: 1.5px solid var(--border);
        }
        .field-group { margin-bottom: 1rem; }
        .field-group label {
            display: block;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 0.38rem;
        }
        .field-group label span { color: var(--error); }
        .field-input, .field-textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--charcoal);
            background: var(--offwhite);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .field-textarea { resize: vertical; min-height: 72px; }
        .field-input:focus, .field-textarea:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
            background: var(--surface);
        }
        .field-input.error { border-color: var(--error); }
        .field-error {
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.3rem;
            display: none;
        }
        .field-error.visible { display: block; }

        .form-actions {
            display: flex;
            gap: 0.6rem;
            justify-content: flex-end;
            margin-top: 1.25rem;
        }
        .btn-cancel {
            padding: 0.55rem 1.1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            background: var(--offwhite);
            color: var(--charcoal);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            display: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-cancel:hover { border-color: var(--teal); color: var(--teal); }
        .btn-cancel.visible { display: block; }

        /* ── Department list ── */
        .list-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.4rem;
            border-bottom: 1.5px solid var(--border);
        }
        .list-title {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .list-count {
            font-size: 0.78rem;
            color: var(--muted);
            background: var(--offwhite);
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            border: 1px solid var(--border);
        }
        .dept-table {
            width: 100%;
            border-collapse: collapse;
        }
        .dept-table th {
            text-align: left;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0.7rem 1.4rem;
            border-bottom: 1.5px solid var(--border);
            background: var(--offwhite);
        }
        .dept-table td {
            padding: 0.95rem 1.4rem;
            font-size: 0.88rem;
            color: var(--charcoal);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .dept-table tr:last-child td { border-bottom: none; }
        .dept-table tr:hover td { background: var(--offwhite); }

        .dept-name {
            font-weight: 600;
            color: var(--charcoal);
        }
        .dept-desc {
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 0.15rem;
        }
        .dept-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.18rem 0.55rem;
            border-radius: 99px;
            background: rgba(0,150,136,0.08);
            color: var(--teal);
            border: 1px solid rgba(0,150,136,0.2);
        }

        .row-actions { display: flex; gap: 0.4rem; justify-content: flex-end; }
        .btn-edit, .btn-delete {
            padding: 0.35rem 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.18s;
        }
        .btn-edit {
            background: var(--offwhite);
            color: var(--charcoal);
            border-color: var(--border);
        }
        .btn-edit:hover { border-color: var(--teal); color: var(--teal); }
        .btn-delete {
            background: rgba(192,57,43,0.07);
            color: var(--error);
            border-color: rgba(192,57,43,0.2);
        }
        .btn-delete:hover { background: rgba(192,57,43,0.14); }

        /* ── Empty / Loading states ── */
        .state-cell {
            text-align: center;
            padding: 3rem 1rem !important;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* ── Message banner ── */
        .message-banner {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
        }
        .message-banner svg { width: 16px; height: 16px; flex-shrink: 0; }
        .message-banner--success {
            background: rgba(46,125,82,0.1);
            color: var(--success);
            border: 1.5px solid rgba(46,125,82,0.25);
        }
        .message-banner--error {
            background: rgba(192,57,43,0.08);
            color: var(--error);
            border: 1.5px solid rgba(192,57,43,0.2);
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Delete confirm modal ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h3 { margin: 0 0 0.5rem; font-size: 1.05rem; }
        .modal p  { font-size: 0.88rem; color: var(--muted); margin: 0 0 1.5rem; }
        .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
    </style>
</head>
<body class="page-body">

<!-- Navbar injected by navbar.js -->

<main class="page-main">
    <div class="page-header">
        <h1 class="page-title">Departments</h1>
        <p class="page-subtitle">Create and manage departments</p>
    </div>

    <div id="messageContainer"></div>

    <div class="dept-grid">

        <!-- ── Left: Form ── -->
        <div class="form-card">
            <p class="form-card-title" id="formTitle">Add Department</p>

            <form id="deptForm">
                <input type="hidden" id="editingId">

                <div class="field-group">
                    <label for="deptName">Name <span>*</span></label>
                    <input type="text" id="deptName" class="field-input" placeholder="e.g., Engineering">
                    <p class="field-error" id="deptNameError">Department name is required</p>
                </div>

                <div class="field-group">
                    <label for="deptDesc">Description</label>
                    <textarea id="deptDesc" class="field-textarea" placeholder="Brief description (optional)"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn" onclick="resetForm()">Cancel</button>
                    <button type="submit" class="btn-action btn-action--primary" id="submitBtn">
                        <span id="submitText">Add Department</span>
                        <div class="spinner" id="spinner" style="display:none;width:14px;height:14px;border-width:2px"></div>
                    </button>
                </div>
            </form>
        </div>

        <!-- ── Right: Table ── -->
        <div class="list-card">
            <div class="list-header">
                <span class="list-title">All Departments</span>
                <span class="list-count" id="deptCount">0 departments</span>
            </div>
            <table class="dept-table">
                <thead>
                <tr>
                    <th>Department</th>
                    <th style="text-align:right">Actions</th>
                </tr>
                </thead>
                <tbody id="deptTableBody">
                <tr><td class="state-cell" colspan="2">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>Delete Department</h3>
        <p id="deleteModalMsg">Are you sure you want to delete this department?</p>
        <div class="modal-actions">
            <button class="btn-cancel visible" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn-action btn-action--primary" id="confirmDeleteBtn"
                    style="background:var(--error);border-color:var(--error)">Delete</button>
        </div>
    </div>
</div>

<script src="js/navbar.js"></script>
<script type="module" src="js/departments.js"></script>
</body>
</html>
