<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee — Employee Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .navbar-logo-accent { color: var(--teal); }

        .form-container {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 2rem;
            max-width: 560px;
        }
        .form-section-title {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1.5px solid var(--border);
        }
        .field-group { margin-bottom: 1rem; }
        .field-group label {
            display: block;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 0.38rem;
        }
        .field-group label span { color: var(--error); }
        .field-input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--charcoal);
            background: var(--offwhite);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
            background: var(--surface);
        }
        .field-input.error { border-color: var(--error); }

        .field-select-wrap { position: relative; }
        .field-select-wrap svg {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%);
            width: 14px; height: 14px;
            stroke: var(--muted); fill: none;
            pointer-events: none;
        }
        .field-select {
            width: 100%;
            appearance: none;
            padding: 0.7rem 2.2rem 0.7rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--charcoal);
            background: var(--offwhite);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }
        .field-select.error { border-color: var(--error); }

        .field-error {
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.3rem;
            display: none;
        }
        .field-error.visible { display: block; }

        .message-banner {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
        }
        .message-banner svg { width: 16px; height: 16px; flex-shrink: 0; }
        .message-banner--success {
            background: rgba(46,125,82,0.1);
            color: var(--success);
            border: 1.5px solid rgba(46,125,82,0.25);
        }
        .message-banner--error {
            background: rgba(192,57,43,0.08);
            color: var(--error);
            border: 1.5px solid rgba(192,57,43,0.2);
        }

        .spinner {
            display: inline-block;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-action--secondary {
            background: var(--offwhite);
            color: var(--charcoal);
            border: 1.5px solid var(--border);
            text-decoration: none;
        }
        .btn-action--secondary:hover { border-color: var(--teal); color: var(--teal); }
    </style>
</head>
<body class="page-body">

<!-- Navbar injected by navbar.js -->

<main class="page-main">
    <div class="page-header">
        <h1 class="page-title">Edit Employee</h1>
        <p class="page-subtitle" id="pageSubtitle">Loading…</p>
    </div>

    <div id="messageContainer"></div>

    <!-- Loading -->
    <div id="loadingState" style="display:block;text-align:center;padding:3rem;color:var(--muted)">
        <p>Loading employee data…</p>
    </div>

    <!-- Form -->
    <div class="form-container" id="formContainer" style="display:none">
        <form id="employeeForm">
            <div class="form-section">
                <p class="form-section-title">Employee Information</p>

                <div class="field-group">
                    <label for="employeeId">Employee ID <span>*</span></label>
                    <input type="text" id="employeeId" class="field-input" readonly
                           style="background:var(--offwhite);cursor:not-allowed;opacity:.7">
                    <p class="field-error" id="employeeIdError">Employee ID is required</p>
                </div>

                <div class="field-group">
                    <label for="name">Full Name <span>*</span></label>
                    <input type="text" id="name" class="field-input" placeholder="e.g., Juan Dela Cruz" required>
                    <p class="field-error" id="nameError">Name is required</p>
                </div>

                <div class="field-group">
                    <label for="dateOfBirth">Date of Birth <span>*</span></label>
                    <input type="date" id="dateOfBirth" class="field-input" required>
                    <p class="field-error" id="dateOfBirthError">Date of birth is required and age must be between 18–100</p>
                </div>

                <div class="field-group">
                    <label for="department">Department <span>*</span></label>
                    <div class="field-select-wrap">
                        <select id="department" class="field-select" required>
                            <option value="">Select Department</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Operations">Operations</option>
                            <option value="Engineering">Engineering</option>
                        </select>
                        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </div>
                    <p class="field-error" id="departmentError">Department is required</p>
                </div>

                <div class="field-group">
                    <label for="salary">Salary (₱) <span>*</span></label>
                    <input type="number" id="salary" class="field-input" placeholder="e.g., 50000" step="0.01" min="0" required>
                    <p class="field-error" id="salaryError">Salary must be greater than 0</p>
                </div>
            </div>

            <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem">
                <a href="index.html" class="btn-action btn-action--secondary">Cancel</a>
                <button type="submit" class="btn-action btn-action--primary" id="submitBtn">
                    <span id="submitText">Save Changes</span>
                    <div class="spinner" id="spinner" style="display:none;width:14px;height:14px;border-width:2px"></div>
                </button>
            </div>
        </form>
    </div>
</main>

<script src="js/navbar.js"></script>
<script src="js/edit-employee.js"></script>
</body>
</html>
