<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Employee Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Brand accent: teal instead of amber */
        .navbar-logo-accent { color: var(--teal); }
        .auth-brand .logo span { color: var(--teal); }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.75rem;
        }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }

        .stat-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.4rem;
        }
        .stat-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.3rem;
        }
        .stat-value {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--charcoal);
            line-height: 1;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        /* Age range inputs */
        .age-range-wrap {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        .age-range-input {
            width: 72px;
            padding: 0.62rem 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--charcoal);
            background: var(--offwhite);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }
        .age-range-input::-webkit-inner-spin-button,
        .age-range-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .age-range-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }
        .age-range-label {
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
        }

        /* Clear filters btn */
        .btn-clear {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.62rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-clear:hover { border-color: var(--teal); color: var(--teal); }

        /* Results count */
        .results-count {
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }

        /* Department badge */
        .dept-badge {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            background: var(--offwhite);
            border: 1px solid var(--border);
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        /* Table container */
        .table-container {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Secondary btn */
        .btn-action--secondary {
            background: var(--offwhite);
            color: var(--charcoal);
            border: 1.5px solid var(--border);
        }
        .btn-action--secondary:hover {
            border-color: var(--teal);
            color: var(--teal);
        }
        .btn-action--danger {
            background: transparent;
            color: var(--error);
            border: 1.5px solid var(--error);
        }
        .btn-action--danger:hover {
            background: rgba(192,57,43,0.07);
        }
    </style>
</head>
<body class="page-body">

<!-- Navbar injected by navbar.js -->

<main class="page-main">
    <!-- Header -->
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
        <div>
            <h1 class="page-title">Employee Dashboard</h1>
            <p class="page-subtitle">Manage and view all employees</p>
        </div>
        <a href="add-employee.html" class="btn-action btn-action--primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Employee
        </a>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <p class="stat-label">Total Employees</p>
            <p class="stat-value" id="totalEmployees">—</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Average Salary</p>
            <p class="stat-value" id="avgSalary" style="font-size:1.35rem">—</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Average Age</p>
            <p class="stat-value" id="avgAge">—</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
        <!-- Search -->
        <div class="search-wrap" style="flex:1;min-width:200px">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" class="search-input"
                   placeholder="Search by name or employee ID…" autocomplete="off">
        </div>

        <!-- Department filter -->
        <div class="category-wrap">
            <select id="departmentFilter" class="category-select">
                <option value="">All Departments</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Marketing">Marketing</option>
                <option value="Sales">Sales</option>
                <option value="Operations">Operations</option>
                <option value="Engineering">Engineering</option>
            </select>
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </div>

        <!-- Age range filter -->
        <div class="age-range-wrap">
            <span class="age-range-label">Age</span>
            <input type="number" id="ageMinInput" class="age-range-input"
                   placeholder="Min" min="0" max="120">
            <span class="age-range-label">–</span>
            <input type="number" id="ageMaxInput" class="age-range-input"
                   placeholder="Max" min="0" max="120">
        </div>

        <!-- Clear button -->
        <button class="btn-clear" id="clearFiltersBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Clear
        </button>
    </div>

    <!-- Results count -->
    <p class="results-count" id="resultsCount"></p>

    <!-- Table -->
    <div class="table-container">
        <div style="overflow-x:auto">
            <table id="employeeTable" style="width:100%;border-collapse:collapse;display:none">
                <thead>
                <tr style="background:var(--offwhite);border-bottom:1.5px solid var(--border)">
                    <th style="padding:.75rem 1rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;white-space:nowrap">Emp ID</th>
                    <th style="padding:.75rem 1rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left">Name</th>
                    <th style="padding:.75rem 1rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;white-space:nowrap">Date of Birth</th>
                    <th style="padding:.75rem 1rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left">Age</th>
                    <th style="padding:.75rem 1rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left">Department</th>
                    <th style="padding:.75rem 1rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left">Salary</th>
                    <th style="padding:.75rem 1rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left">Actions</th>
                </tr>
                </thead>
                <tbody id="employeeTableBody"></tbody>
            </table>
        </div>

        <!-- Empty state -->
        <div id="emptyState" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:4rem 2rem;color:var(--muted)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"
                 style="width:40px;height:40px;stroke:var(--border)">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
            <p style="font-size:.9rem">No employees found.</p>
            <a href="add-employee.html" class="btn-action btn-action--primary"
               style="margin-top:.25rem;font-size:.8rem;padding:.55rem 1.1rem">Add First Employee</a>
        </div>
    </div>
</main>

<!-- Delete confirmation modal -->
<div id="deleteModal"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center">
    <div style="background:var(--surface);border-radius:14px;padding:2rem;max-width:380px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)">
        <div style="display:flex;justify-content:center;margin-bottom:.75rem;color:var(--error)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 width="40" height="40" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <h2 style="font-family:'DM Serif Display',serif;margin-bottom:.4rem;color:var(--charcoal)">Delete Employee?</h2>
        <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.25rem">
            <strong id="deleteEmployeeName"></strong> will be permanently removed.
        </p>
        <div style="display:flex;gap:.75rem;justify-content:center">
            <button onclick="closeDeleteModal()" class="btn-action btn-action--secondary"
                    style="flex:1;border:1.5px solid var(--border)">Cancel</button>
            <button id="confirmDeleteBtn" class="btn-action btn-action--danger"
                    style="flex:1">Delete</button>
        </div>
    </div>
</div>

<script src="js/navbar.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
