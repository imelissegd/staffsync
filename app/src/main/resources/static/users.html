<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users — Employee Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .navbar-logo-accent { color: var(--teal); }

        /* ── Page layout ── */
        .users-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 820px) {
            .users-grid { grid-template-columns: 1fr; }
        }

        /* ── Form card ── */
        .form-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            position: sticky;
            top: 1.5rem;
        }
        .form-card-title {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.25rem;
            padding-bottom: 0.6rem;
            border-bottom: 1.5px solid var(--border);
        }
        .field-group { margin-bottom: 1rem; }
        .field-group label {
            display: block;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 0.38rem;
        }
        .field-group label span { color: var(--error); }
        .field-input, .field-select {
            width: 100%;
            padding: 0.7rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--charcoal);
            background: var(--offwhite);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .field-select { appearance: none; cursor: pointer; }
        .field-input:focus, .field-select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
            background: var(--surface);
        }
        .field-input.error { border-color: var(--error); }
        .field-error {
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.3rem;
            display: none;
        }
        .field-error.visible { display: block; }
        .form-actions { display: flex; justify-content: flex-end; margin-top: 1.25rem; }

        /* ── List card ── */
        .list-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.4rem;
            border-bottom: 1.5px solid var(--border);
        }
        .list-title {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .list-count {
            font-size: 0.78rem;
            color: var(--muted);
            background: var(--offwhite);
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            border: 1px solid var(--border);
        }

        /* ── Table ── */
        .users-table { width: 100%; border-collapse: collapse; }
        .users-table th {
            text-align: left;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0.7rem 1.4rem;
            border-bottom: 1.5px solid var(--border);
            background: var(--offwhite);
        }
        .users-table td {
            padding: 0.9rem 1.4rem;
            font-size: 0.88rem;
            color: var(--charcoal);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .users-table tr:last-child td { border-bottom: none; }
        .users-table tr:hover td    { background: var(--offwhite); }
        .row--self td               { background: rgba(0,150,136,0.03); }

        /* ── Name + (you) label ── */
        .user-name  { font-weight: 600; }
        .self-label {
            font-size: 0.75rem;
            color: var(--teal);
            margin-left: 0.4rem;
            font-weight: 500;
        }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
        }
        .badge--admin   { background: rgba(0,150,136,0.1);   color: var(--teal);    border: 1px solid rgba(0,150,136,0.25); }
        .badge--user    { background: var(--offwhite);         color: var(--muted);   border: 1px solid var(--border); }
        .badge--active  { background: rgba(46,125,82,0.1);    color: var(--success); border: 1px solid rgba(46,125,82,0.25); }
        .badge--inactive{ background: rgba(192,57,43,0.07);   color: var(--error);   border: 1px solid rgba(192,57,43,0.2); }

        /* ── Row action buttons ── */
        .row-actions       { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: flex-end; }
        .btn-action-sm {
            padding: 0.3rem 0.65rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.18s;
        }
        .btn-promote   { background: rgba(0,150,136,0.08);  color: var(--teal);    border-color: rgba(0,150,136,0.25); }
        .btn-promote:hover { background: rgba(0,150,136,0.18); }
        .btn-demote    { background: var(--offwhite);        color: var(--charcoal); border-color: var(--border); }
        .btn-demote:hover  { border-color: var(--teal); color: var(--teal); }
        .btn-activate  { background: rgba(46,125,82,0.08);  color: var(--success); border-color: rgba(46,125,82,0.25); }
        .btn-activate:hover { background: rgba(46,125,82,0.16); }
        .btn-deactivate{ background: rgba(192,57,43,0.07);  color: var(--error);   border-color: rgba(192,57,43,0.2); }
        .btn-deactivate:hover { background: rgba(192,57,43,0.14); }

        /* ── Empty / loading states ── */
        .state-cell {
            text-align: center;
            padding: 3rem 1rem !important;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* ── Message banner ── */
        .message-banner {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
        }
        .message-banner svg { width: 16px; height: 16px; flex-shrink: 0; }
        .message-banner--success {
            background: rgba(46,125,82,0.1);
            color: var(--success);
            border: 1.5px solid rgba(46,125,82,0.25);
        }
        .message-banner--error {
            background: rgba(192,57,43,0.08);
            color: var(--error);
            border: 1.5px solid rgba(192,57,43,0.2);
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="page-body">

<!-- Navbar injected by navbar.js -->

<main class="page-main">
    <div class="page-header">
        <h1 class="page-title">Users</h1>
        <p class="page-subtitle">Register and manage system users</p>
    </div>

    <div id="messageContainer"></div>

    <div class="users-grid">

        <!-- ── Left: Register form ── -->
        <div class="form-card">
            <p class="form-card-title">Register New User</p>

            <form id="userForm">
                <div class="field-group">
                    <label for="username">Username <span>*</span></label>
                    <input type="text" id="username" class="field-input"
                           placeholder="e.g., jdelacruz" autocomplete="off">
                    <p class="field-error" id="usernameError">Username is required</p>
                </div>

                <div class="field-group">
                    <label for="password">Password <span>*</span></label>
                    <input type="password" id="password" class="field-input"
                           placeholder="Min. 6 characters" autocomplete="new-password">
                    <p class="field-error" id="passwordError">Password must be at least 6 characters</p>
                </div>

                <div class="field-group">
                    <label for="role">Role <span>*</span></label>
                    <select id="role" class="field-select">
                        <option value="ROLE_USER">User</option>
                        <option value="ROLE_ADMIN">Admin</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-action btn-action--primary" id="submitBtn">
                        <span id="submitText">Register User</span>
                        <div class="spinner" id="spinner"
                             style="display:none;width:14px;height:14px;border-width:2px"></div>
                    </button>
                </div>
            </form>
        </div>

        <!-- ── Right: Users table ── -->
        <div class="list-card">
            <div class="list-header">
                <span class="list-title">All Users</span>
                <span class="list-count" id="userCount">0 users</span>
            </div>
            <table class="users-table">
                <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th style="text-align:right">Actions</th>
                </tr>
                </thead>
                <tbody id="userTableBody">
                <tr><td class="state-cell" colspan="4">Loading…</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</main>

<script src="js/navbar.js"></script>
<script type="module" src="js/users.js"></script>
</body>
</html>
