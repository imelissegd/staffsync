# ============================================================
# urls.properties
# Centralized URL/path configuration for all backend endpoints.
# ============================================================

# CORS
cors.allowed.origins=*

# Auth endpoints
api.auth.base=/api/auth
api.auth.register=/register
api.auth.login=/login

# Department endpoints
api.departments.base=/api/departments
api.departments.by.name=/name/{name}

# Employee endpoints
api.employees.base=/api/employees
api.employees.by.employee.id=/employee-id/{employeeId}
api.employees.search=/search
api.employees.by.department=/department/{department}
api.employees.avg.salary=/statistics/average-salary
api.employees.avg.age=/statistics/average-age
api.employees.report.by.department=/reports/by-department
api.employees.report.by.age=/reports/by-age

# User management endpoints (admin)
api.users.base=/api/users
api.users.role=/{id}/role
api.users.status=/{id}/status